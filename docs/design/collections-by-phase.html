h1 { font-size:20px; font-weight:500; color:#002845; margin-bottom:4px; }
.subtitle { font-size:13px; color:#5F5E5A; margin-bottom:20px; }

.legend-item { display:flex; align-items:center; gap:5px; font-size:11px; color:#444441; }
.legend-dot { width:12px; height:12px; border-radius:3px; border:0.5px solid rgba(0,0,0,0.1); }

.nav-btn:hover { background:#EBF5FA; color:#3A8DA8; border-color:#3A8DA8; }
.nav-btn.active { background:#002845; color:#fff; border-color:#002845; }

.phase { display:none; }
.phase.active { display:block; }
.phase-header { margin-bottom:20px; }
.phase-title { font-size:18px; font-weight:500; color:#002845; margin-bottom:6px; }
.phase-desc { font-size:13px; color:#5F5E5A; line-height:1.6; padding:12px 16px; background:#EDF5FB; border-radius:8px; border-left:3px solid #3A8DA8; }

.collections-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:12px; margin-bottom:24px; }

.col-card { border-radius:10px; border:0.5px solid #e2e0d8; overflow:hidden; background:#fff; }
.col-card.inactive { opacity:0.35; }
.col-card.inactive .col-header { background:#f1efe8; }
.col-header { padding:10px 14px; display:flex; align-items:center; justify-content:space-between; }
.col-name { font-size:14px; font-weight:500; }
.col-ops { display:flex; gap:4px; }
.col-op { font-size:9px; font-weight:600; padding:2px 7px; border-radius:3px; letter-spacing:.3px; }
.op-create { background:#EAF3DE; color:#27500A; }
.op-read { background:#f1efe8; color:#444441; }
.op-update { background:#E6F1FB; color:#0C447C; }
.op-trigger { background:#FFF4EC; color:#CC6010; }

.col-body { padding:10px 14px; border-top:0.5px solid #e2e0d8; }
.col-detail { font-size:11px; color:#5F5E5A; line-height:1.6; margin-bottom:6px; }
.col-detail:last-child { margin-bottom:0; }
.col-detail strong { color:#002845; font-weight:500; }
.col-who { display:inline-block; font-size:9px; padding:1px 6px; border-radius:3px; font-weight:500; margin-right:4px; }
.who-client { background:#EEEDFE; color:#3C3489; }
.who-lawyer { background:#E1F5EE; color:#085041; }
.who-server { background:#F1EFE8; color:#444441; }
.who-webhook { background:#FAECE7; color:#712B13; }

.flow-arrow { text-align:center; padding:12px 0; font-size:13px; color:#B4B2A9; }
.flow-arrow .arrow { font-size:18px; display:block; }

.summary { background:#fff; border-radius:10px; border:0.5px solid #e2e0d8; padding:16px 20px; margin-top:24px; }
.summary-title { font-size:14px; font-weight:500; color:#002845; margin-bottom:12px; }
.summary-table { width:100%; border-collapse:collapse; font-size:12px; }
.summary-table th { text-align:left; padding:8px 10px; background:#f8f7f4; color:#5F5E5A; font-weight:500; border-bottom:0.5px solid #e2e0d8; }
.summary-table td { padding:8px 10px; border-bottom:0.5px solid #f1efe8; color:#444441; }
.summary-table tr:last-child td { border-bottom:none; }
.dot { display:inline-block; width:8px; height:8px; border-radius:2px; margin-right:2px; }

.triggers-section { margin-top:16px; padding-top:16px; border-top:0.5px solid #e2e0d8; }
.trigger-item { font-size:11px; color:#5F5E5A; padding:4px 0; display:flex; align-items:flex-start; gap:6px; line-height:1.5; }
.trigger-icon { color:#FF8C3C; font-weight:600; flex-shrink:0; margin-top:1px; }

const opLabel = {create:'CREATE', read:'READ', update:'UPDATE', trigger:'TRIGGER'};
const opClass = {create:'op-create', read:'op-read', update:'op-update', trigger:'op-trigger'};
const whoLabel = {client:'Cliente', lawyer:'Abogado', server:'Server', webhook:'Webhook'};
const whoClass = {client:'who-client', lawyer:'who-lawyer', server:'who-server', webhook:'who-webhook'};

function renderNav() {
  document.getElementById('nav').innerHTML = data.map((p,i) =>
    `<button class="nav-btn ${i===0?'active':''}" onclick="show('${p.id}')">${p.label}</button>`
  ).join('');
}

function show(id) {
  data.forEach((p,i) => {
    document.querySelectorAll('.nav-btn')[i].classList.toggle('active', p.id===id);
  });
  document.querySelectorAll('.phase').forEach(el => el.classList.remove('active'));
  document.getElementById('p-'+id).classList.add('active');
}

function render() {
  renderNav();
  const el = document.getElementById('content');
  el.innerHTML = data.map(p => {
    let h = `<div class="phase ${p.id===data[0].id?'active':''}" id="p-${p.id}">`;
    h += `<div class="phase-header"><div class="phase-title">${p.title}</div>`;
    h += `<div class="phase-desc">${p.desc}</div></div>`;

    const active = p.collections.filter(c=>c.active);
    const inactive = p.collections.filter(c=>!c.active);

    h += `<div class="collections-grid">`;
    active.forEach(c => {
      h += `<div class="col-card">`;
      h += `<div class="col-header" style="background:${c.header}">`;
      h += `<span class="col-name" style="color:${c.headerText}">${c.name}</span>`;
      h += `<div class="col-ops">${c.ops.map(o=>`<span class="col-op ${opClass[o]}">${opLabel[o]}</span>`).join('')}</div>`;
      h += `</div>`;
      if (c.details.length || c.triggers.length) {
        h += `<div class="col-body">`;
        c.details.forEach(d => {
          h += `<div class="col-detail"><span class="col-who ${whoClass[d.who]}">${whoLabel[d.who]}</span> ${d.text}</div>`;
        });
        if (c.triggers.length) {
          h += `<div class="triggers-section">`;
          c.triggers.forEach(t => {
            h += `<div class="trigger-item"><span class="trigger-icon">→</span>${t}</div>`;
          });
          h += `</div>`;
        }
        h += `</div>`;
      }
      h += `</div>`;
    });
    h += `</div>`;

    if (inactive.length) {
      h += `<div class="summary"><div class="summary-title">No se tocan en esta fase</div>`;
      h += `<div style="display:flex;flex-wrap:wrap;gap:6px">`;
      inactive.forEach(c => {
        h += `<span style="font-size:12px;color:#B4B2A9;background:#f8f7f4;padding:4px 10px;border-radius:4px">${c.name}</span>`;
      });
      h += `</div></div>`;
    }

    // Summary table
    h += `<div class="summary" style="margin-top:16px"><div class="summary-title">Resumen de operaciones en esta fase</div>`;
    h += `<table class="summary-table"><tr><th>Colección</th><th>Operaciones</th><th>Quién actúa</th></tr>`;
    active.forEach(c => {
      const whos = [...new Set(c.details.map(d=>d.who))];
      h += `<tr><td style="font-weight:500">${c.name}</td>`;
      h += `<td>${c.ops.map(o=>`<span class="col-op ${opClass[o]}" style="margin-right:3px">${opLabel[o]}</span>`).join('')}</td>`;
      h += `<td>${whos.map(w=>`<span class="col-who ${whoClass[w]}">${whoLabel[w]}</span>`).join(' ')}</td>`;
      h += `</tr>`;
    });
    h += `</table></div>`;

    h += `</div>`;
    return h;
  }).join('');
}

render();
